<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaldo - Produk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="page-produk">
  <header class="site-header">
    <div class="brand-mark" aria-label="Kaldo">
      <img src="header/logo.png" alt="Kaldo logo" />
    </div>

    <nav class="top-nav" aria-label="Navigasi utama">
      <a class="nav-item" href="index.html" aria-label="Beranda">
        <img src="header/beranda.png" alt="" />
      </a>
      <a class="nav-item" href="profil.html" aria-label="Profil">
        <img src="header/profil.png" alt="" />
      </a>
      <a class="nav-item" href="produk.html" aria-label="Produk">
        <img src="header/produk.png" alt="" />
      </a>
      <a class="nav-item" href="tips.html" aria-label="Tips">
        <img src="header/tips.png" alt="" />
      </a>
      <a class="nav-item" href="kontak.html" aria-label="Kontak">
        <img src="header/kontak.png" alt="" />
      </a>
    </nav>
  </header>

  <main class="produk-main">

    <!-- Banner hero full-width -->
    <section class="produk-banner" aria-label="Banner produk Kaldo">
      <img src="produk/hero.png" alt="Bawa Ketenangan Alam ke Dalam Rumah Anda" />
    </section>

    <!-- Katalog produk -->
    <div class="produk-content">
      <div class="katalog-list">
        <img src="produk/p1.png" alt="Produk 1" />
        <img src="produk/p2.png" alt="Produk 2" />
        <img src="produk/p3.png" alt="Produk 3" />
        <img src="produk/p4.png" alt="Produk 4" />
        <img src="produk/p5.png" alt="Produk 5" />
      </div>
    </div>

  </main>

  <!-- SIMPLE FOOTER -->
  <footer class="simple-footer">
    &copy; 2026 Kaldo Essential Oil.
  </footer>
</body>

</html>
